<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keirin AI Lab</title>
    <style>
:root {
  color-scheme: light;
  /* WINTICKET(keirin)の実トークンに合わせた配色 */
  --color-bg: #f1f1f5;
  --color-sidebar: #18181a;
  --color-surface: #ffffff;
  --color-surface-muted: #f1f1f5;
  --color-surface-raised: #ffffff;
  --color-text: #2b2b2e;
  --color-ink-900: #18181a;
  --color-ink-800: #2b2b2e;
  --color-muted: #65666d;
  --color-subtle: #8d8f97;
  --color-border: #e4e5ea;
  --color-border-strong: #cfd1d8;
  --color-accent: #008765;
  --color-accent-dark: #00735b;
  --color-blue: #003abf;
  --color-amber: #d45e00;
  --color-orange: #f4792a;
  --color-gold: #ffc010;
  --color-purple: #5d3dd5;
  --color-red: #bf0015;
  --color-green-soft: #e5f3ee;
  --color-blue-soft: #d7e4ff;
  --color-amber-soft: #fff1e3;
  --color-purple-soft: #e6e0ff;
  --color-red-soft: #ffecea;
  --shadow-card: 0 2px 8px rgba(24, 24, 26, 0.06);
  --shadow-panel: 0 1px 2px rgba(24, 24, 26, 0.04), 0 6px 20px rgba(24, 24, 26, 0.06);
  --shadow-focus: 0 0 0 3px rgba(0, 135, 101, 0.18);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --text-xs: 12px;
  --text-sm: 13px;
  --text-md: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 26px;
}

* {
  box-sizing: border-box;
}

html {
  background: var(--color-bg);
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--color-bg);
  color: var(--color-text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
  font-size: var(--text-md);
  line-height: 1.55;
}

button,
input,
select {
  font: inherit;
}

.app-shell {
  display: grid;
  grid-template-columns: 304px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
  height: 100vh;
  overflow-y: auto;
  padding: var(--space-6);
  border-right: none;
  background: var(--color-sidebar);
  color: #ffffff;
}

.sidebar .brand h1,
.sidebar .sidebar-title {
  color: #ffffff;
}

.sidebar .brand-kicker,
.sidebar .field span,
.sidebar .notice {
  color: #8d8f97;
}

.sidebar .status {
  border-color: #3e3f43;
  background: #2b2b2e;
  color: #b7b8c0;
}

.sidebar .sidebar-group,
.sidebar .notice {
  border-top-color: #2b2b2e;
}

.sidebar input,
.sidebar select {
  border-color: #3e3f43;
  background: #2b2b2e;
  color: #ffffff;
}

.sidebar .button {
  border-color: #3e3f43;
  background: #2b2b2e;
  color: #ffffff;
}

.sidebar .button.primary {
  border-color: var(--color-accent);
  background: var(--color-accent);
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  flex: 0 0 auto;
  border-radius: var(--radius-md);
  background: var(--color-accent);
  color: #ffffff;
  font-weight: 800;
}

.brand-copy {
  min-width: 0;
}

.brand-kicker,
.eyebrow,
.field span,
.metric span,
.metric em,
.page-meta,
.section-head span,
.muted,
.notice {
  color: var(--color-muted);
  font-size: var(--text-xs);
}

.brand-kicker,
.eyebrow,
.field span,
.sidebar-title {
  font-weight: 800;
}

.brand h1,
.race-title-block h3,
h2,
h3,
h4,
p {
  margin: 0;
}

.brand h1 {
  overflow: hidden;
  font-size: var(--text-xl);
  line-height: 1.2;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status {
  min-height: 40px;
  padding: 10px 12px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: #ffffff;
  color: var(--color-muted);
  font-size: var(--text-sm);
}

.tabs,
.sidebar-group,
.field {
  display: grid;
}

.tabs {
  gap: var(--space-2);
}

.tab,
.button {
  min-height: 40px;
  border: 1px solid var(--color-border);
  border-radius: 999px;
  padding: 9px 16px;
  background: var(--color-surface);
  color: var(--color-text);
  cursor: pointer;
  font-weight: 700;
  transition: border-color 150ms ease, background-color 150ms ease, box-shadow 150ms ease;
}

.tab {
  text-align: left;
}

.tab.active {
  border-color: rgba(15, 118, 110, 0.42);
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
  font-weight: 800;
}

.button.primary {
  border-color: var(--color-accent);
  background: var(--color-accent);
  color: #ffffff;
  font-weight: 800;
}

.tab:hover,
.button:hover,
input:hover,
select:hover {
  border-color: var(--color-border-strong);
}

.button.primary:hover {
  border-color: var(--color-accent-dark);
  background: var(--color-accent-dark);
}

.tab:focus-visible,
.button:focus-visible,
input:focus-visible,
select:focus-visible,
summary:focus-visible,
a:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
}

.sidebar-group {
  gap: var(--space-3);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-border);
}

.sidebar-title {
  color: var(--color-text);
  font-size: var(--text-sm);
}

.field {
  gap: 6px;
}

.field.compact {
  gap: var(--space-1);
}

input,
select {
  width: 100%;
  min-height: 40px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 9px 11px;
  background: var(--color-surface);
  color: var(--color-text);
}

::placeholder {
  color: var(--color-subtle);
}

.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-2);
}

.notice {
  margin-top: auto;
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-border);
  line-height: 1.7;
}

.workspace {
  min-width: 0;
  padding: var(--space-8);
}

.panel {
  display: block;
}

.panel + .panel {
  margin-top: var(--space-8);
  padding-top: var(--space-8);
  border-top: 1px solid var(--color-border);
}

.page-header,
.race-head,
.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
}

.page-header {
  margin-bottom: var(--space-5);
}

.eyebrow {
  margin-bottom: 6px;
  text-transform: uppercase;
}

h2 {
  font-size: var(--text-2xl);
  line-height: 1.25;
}

h3 {
  font-size: var(--text-lg);
  line-height: 1.35;
}

h4 {
  margin-bottom: var(--space-2);
  font-size: var(--text-sm);
  line-height: 1.35;
}

.page-meta {
  padding-top: var(--space-2);
  text-align: right;
}

.metric-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(146px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

#todayMetrics {
  grid-template-columns: repeat(6, minmax(112px, 1fr));
}

.metric {
  min-height: 84px;
  padding: var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
}

.metric-teal {
  --metric-color: var(--color-accent);
}

.metric-green {
  --metric-color: var(--color-accent-dark);
}

.metric-blue {
  --metric-color: var(--color-blue);
}

.metric-amber {
  --metric-color: var(--color-amber);
}

.metric-purple {
  --metric-color: var(--color-purple);
}

.metric-slate {
  --metric-color: var(--color-muted);
}

.metric strong {
  display: block;
  margin-top: 6px;
  color: var(--metric-color, var(--color-text));
  font-size: 24px;
  line-height: 1;
}

.metric em {
  display: block;
  margin-top: var(--space-2);
  font-style: normal;
}

.capital-planner {
  margin-bottom: var(--space-5);
  padding: var(--space-5);
  border-color: rgba(15, 118, 110, 0.18);
  background:
    linear-gradient(180deg, rgba(15, 118, 110, 0.06), transparent 150px),
    var(--color-surface);
  box-shadow: var(--shadow-panel);
}

.capital-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.capital-form {
  display: grid;
  grid-template-columns: repeat(3, minmax(108px, 132px)) repeat(2, minmax(118px, auto)) auto;
  gap: var(--space-2);
  align-items: end;
}

.check-field {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-height: 40px;
  padding: 8px 10px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface-raised);
  color: var(--color-text);
  font-size: var(--text-sm);
  font-weight: 800;
  white-space: nowrap;
}

.check-field input {
  width: 16px;
  min-height: 16px;
}

.plan-result {
  display: grid;
  gap: var(--space-3);
}

.plan-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
}

.plan-meta span {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  border-radius: 999px;
  padding: 4px 9px;
  background: var(--color-surface-muted);
}

.plan-grid {
  display: grid;
  gap: var(--space-3);
}

.plan-card {
  display: grid;
  gap: var(--space-3);
  padding: var(--space-4);
  border: 1px solid var(--color-border);
  border-left: 4px solid var(--color-blue);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
  box-shadow: 0 1px 2px rgba(16, 24, 32, 0.04);
}

.plan-card.is-reached {
  border-left-color: var(--color-accent);
}

.plan-card.is-short {
  border-left-color: var(--color-amber);
}

.plan-card-head,
.plan-race,
.plan-ticket,
.plan-money,
.plan-warnings {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
}

.plan-card-head {
  justify-content: space-between;
  gap: var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--color-border);
}

.plan-card-head h4 {
  margin-top: 5px;
  margin-bottom: 0;
  font-size: var(--text-lg);
}

.plan-return {
  display: grid;
  justify-items: end;
  color: var(--color-muted);
  font-size: var(--text-xs);
  text-align: right;
}

.plan-return strong {
  color: var(--color-ink-900);
  font-size: var(--text-xl);
}

.plan-legs {
  display: grid;
  gap: var(--space-2);
}

.plan-leg {
  display: grid;
  grid-template-columns: minmax(200px, 0.8fr) minmax(210px, 0.82fr) minmax(180px, 0.62fr);
  gap: var(--space-3);
  align-items: start;
  padding: var(--space-3);
  border: 1px solid rgba(16, 24, 32, 0.06);
  border-radius: var(--radius-lg);
  background: #ffffff;
}

.plan-race strong,
.plan-ticket b {
  color: var(--color-ink-900);
}

.plan-race span:last-child {
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
}

.plan-ticket,
.plan-money {
  flex-wrap: wrap;
}

.plan-ticket span,
.plan-money span,
.plan-money strong,
.plan-reasons span,
.plan-warnings span {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: var(--text-xs);
  font-weight: 800;
}

.odds-live {
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
}

.odds-estimated {
  background: var(--color-amber-soft);
  color: var(--color-amber);
}

.plan-money {
  justify-content: flex-end;
}

.plan-money span {
  background: var(--color-blue-soft);
  color: var(--color-blue);
}

.plan-money strong {
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
}

.ev-chip {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: var(--text-xs);
  font-style: normal;
  font-weight: 900;
}

.ev-positive {
  background: #e6f8ed;
  color: #137333;
}

.ev-caution {
  background: var(--color-amber-soft);
  color: var(--color-amber);
}

.plan-reasons {
  grid-column: 1 / -1;
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.plan-reasons span {
  background: #ffffff;
  color: var(--color-muted);
}

.plan-reasons .ex-signal {
  background: var(--color-purple-soft);
  color: var(--color-purple);
}

.plan-warnings {
  flex-wrap: wrap;
}

.plan-warnings span {
  background: var(--color-red-soft);
  color: var(--color-red);
}

.race-list {
  display: grid;
  gap: var(--space-4);
}

.venue-board {
  margin-bottom: var(--space-5);
  padding: var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(135deg, rgba(15, 118, 110, 0.1), transparent 42%),
    var(--color-surface);
  box-shadow: var(--shadow-panel);
}

.venue-board-head {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.venue-board-head span {
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
}

.venue-board-head strong {
  font-size: var(--text-lg);
}

.venue-strip {
  display: flex;
  gap: var(--space-3);
  overflow-x: auto;
  padding-bottom: 2px;
}

.venue-chip {
  display: grid;
  gap: 4px;
  min-width: 172px;
  flex: 0 0 auto;
  padding: var(--space-3);
  border: 1px solid rgba(15, 118, 110, 0.18);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, #ffffff 0%, #f5faf8 100%);
  box-shadow: inset 0 -1px 0 rgba(15, 118, 110, 0.08);
}

.venue-chip strong {
  font-size: var(--text-lg);
}

.venue-chip small {
  color: var(--color-muted);
  font-size: var(--text-xs);
}

.venue-chip em {
  color: var(--color-accent-dark);
  font-size: var(--text-xs);
  font-style: normal;
  font-weight: 900;
}

.status-dot {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--color-accent-dark);
  font-size: var(--text-xs);
  font-weight: 900;
}

.status-dot::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--color-accent);
  box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
}

.venue-section {
  display: grid;
  gap: var(--space-3);
  padding-top: var(--space-2);
  border-top: 1px solid var(--color-border-strong);
}

.venue-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, #ffffff 0%, #f8fafb 100%);
}

.venue-section-head h3 {
  margin-top: 3px;
  font-size: var(--text-xl);
}

.venue-section-head p {
  margin-top: 2px;
  color: var(--color-muted);
  font-size: var(--text-sm);
}

.venue-section-stats,
.venue-ribbon-list {
  display: grid;
  gap: var(--space-2);
}

.venue-section-stats {
  justify-items: end;
  color: var(--color-muted);
  font-size: var(--text-xs);
  white-space: nowrap;
}

.race-ribbon {
  --ribbon-color: var(--color-accent);
  --ribbon-soft: var(--color-green-soft);
  overflow: hidden;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
}

.race-ribbon:hover {
  border-color: rgba(15, 118, 110, 0.36);
  box-shadow: 0 8px 18px rgba(16, 24, 32, 0.06);
  transform: translateY(-1px);
}

.race-ribbon.is-strong {
  --ribbon-color: var(--color-accent);
  --ribbon-soft: var(--color-green-soft);
}

.race-ribbon.is-medium {
  --ribbon-color: var(--color-blue);
  --ribbon-soft: var(--color-blue-soft);
}

.race-ribbon.is-mixed {
  --ribbon-color: var(--color-amber);
  --ribbon-soft: var(--color-amber-soft);
}

.race-ribbon[open] {
  box-shadow: var(--shadow-card);
}

.race-ribbon > summary {
  list-style: none;
}

.race-ribbon > summary::-webkit-details-marker {
  display: none;
}

.ribbon-summary {
  display: grid;
  grid-template-columns: 74px 46px minmax(180px, 1fr) minmax(170px, 0.78fr) auto 18px;
  gap: var(--space-3);
  align-items: center;
  min-height: 62px;
  padding: 10px var(--space-4) 10px var(--space-3);
  border-left: 4px solid var(--ribbon-color);
  background:
    linear-gradient(90deg, var(--ribbon-soft) 0%, #ffffff 28%, #ffffff 100%);
  cursor: pointer;
}

.ribbon-summary::after {
  content: "";
  grid-column: 6;
  width: 9px;
  height: 9px;
  justify-self: end;
  border-right: 2px solid var(--color-muted);
  border-bottom: 2px solid var(--color-muted);
  transform: rotate(45deg);
  transition: transform 160ms ease;
}

.race-ribbon[open] .ribbon-summary::after {
  transform: rotate(225deg);
}

.ribbon-summary > strong {
  color: var(--color-ink-900);
  font-size: var(--text-lg);
}

.ribbon-time {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 30px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--color-ink-900), #26323d);
  color: #ffffff;
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
  font-weight: 900;
}

.ribbon-main {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
  color: var(--color-ink-900);
  font-weight: 900;
}

.ribbon-main .car {
  flex: 0 0 auto;
}

.ribbon-main em {
  color: var(--ribbon-color);
  font-style: normal;
  font-variant-numeric: tabular-nums;
  font-weight: 900;
  white-space: nowrap;
}

.ribbon-tickets {
  overflow: hidden;
  color: var(--color-muted);
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ribbon-tickets::before {
  content: "買い目 ";
  color: var(--color-subtle);
  font-size: var(--text-xs);
  font-weight: 800;
}

.ribbon-summary .confidence-badge {
  justify-self: end;
  white-space: nowrap;
}

.ribbon-body {
  padding: var(--space-4);
  border-top: 1px solid var(--color-border);
  background: linear-gradient(180deg, #f8fafb 0%, #f3f6f8 100%);
}

.race-card.ribbon-card {
  margin: 0;
  border-top-width: 0;
  border-left: 4px solid var(--card-color, var(--color-border));
  box-shadow: none;
}

.race-card,
.race-head,
.surface-panel,
.source-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  box-shadow: var(--shadow-panel);
}

.race-card {
  padding: var(--space-5);
  border-top-width: 4px;
  border-top-color: var(--card-color, var(--color-border));
}

.race-card.is-strong {
  --card-color: var(--color-accent);
}

.race-card.is-medium {
  --card-color: var(--color-blue);
}

.race-card.is-mixed {
  --card-color: var(--color-amber);
}

.race-card-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
  gap: var(--space-5);
  align-items: start;
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--color-border);
}

.race-title-block {
  min-width: 0;
}

.race-title-block h3 {
  margin-top: 6px;
  font-size: 22px;
}

.race-title-block p {
  margin-top: 6px;
  color: var(--color-muted);
}

.time-chip,
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 24px;
  border-radius: 999px;
  padding: 3px 10px;
  font-size: var(--text-xs);
  font-weight: 800;
}

.time-chip {
  background: var(--color-surface-muted);
  color: var(--color-accent-dark);
}

.badge {
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
}

.confidence-summary {
  display: grid;
  justify-items: end;
  gap: 6px;
  color: var(--color-muted);
  font-size: var(--text-xs);
  text-align: right;
}

.is-medium .confidence-badge {
  background: var(--color-blue-soft);
  color: var(--color-blue);
}

.is-mixed .confidence-badge {
  background: var(--color-amber-soft);
  color: var(--color-amber);
}

.prediction-summary {
  display: grid;
  grid-template-columns: minmax(210px, 260px) minmax(0, 1fr) minmax(220px, 300px);
  gap: var(--space-4);
  align-items: stretch;
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--color-border);
}

.main-pick {
  min-width: 0;
  padding: var(--space-3);
  border: 1px solid rgba(15, 118, 110, 0.18);
  border-left: 4px solid var(--color-accent);
  border-radius: var(--radius-lg);
  background: #ffffff;
}

.main-pick span {
  display: block;
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
}

.main-pick strong {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-1);
  font-size: var(--text-xl);
}

.main-pick em,
.rank-pill em,
.ticket-chip em {
  color: var(--color-accent-dark);
  font-style: normal;
  font-weight: 800;
}

.main-pick em {
  display: block;
  margin-top: 6px;
  font-size: var(--text-lg);
}

.top3-row,
.ticket-row,
.reason-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.rank-pill,
.ticket-chip,
.reason-list span {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 32px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 5px 8px;
  background: #ffffff;
  font-size: var(--text-sm);
}

.rank-pill:first-child,
.ticket-chip:first-child {
  border-color: rgba(15, 118, 110, 0.32);
  background: var(--color-green-soft);
}

.rank-pill b {
  color: var(--color-amber);
}

.ticket-row {
  justify-content: flex-end;
}

.ticket-chip {
  font-variant-numeric: tabular-nums;
}

.line-diagram {
  display: grid;
  gap: var(--space-3);
  margin-top: var(--space-4);
  padding: var(--space-4);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(16, 24, 32, 0.06);
  background: linear-gradient(180deg, #f9fbfd 0%, #ffffff 100%);
}

.diagram-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-3);
}

.diagram-title span {
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
}

.diagram-title strong {
  font-size: var(--text-sm);
}

.line-tracks {
  display: grid;
  gap: var(--space-2);
}

.line-track {
  --line-color: var(--color-accent);
  --line-soft: var(--color-green-soft);
  display: grid;
  grid-template-columns: 112px minmax(0, 1fr);
  gap: var(--space-3);
  align-items: center;
  padding: var(--space-3);
  border-left: 4px solid var(--line-color);
  border-radius: var(--radius-lg);
  background: var(--line-soft);
}

.line-color-1 {
  --line-color: var(--color-accent);
  --line-soft: var(--color-green-soft);
}

.line-color-2 {
  --line-color: var(--color-blue);
  --line-soft: var(--color-blue-soft);
}

.line-color-3 {
  --line-color: var(--color-amber);
  --line-soft: var(--color-amber-soft);
}

.line-color-4 {
  --line-color: var(--color-purple);
  --line-soft: var(--color-purple-soft);
}

.line-color-5 {
  --line-color: var(--color-red);
  --line-soft: var(--color-red-soft);
}

.line-track-label {
  min-width: 0;
}

.line-track-label b,
.line-track-label span {
  display: block;
}

.line-track-label b {
  color: var(--color-text);
  font-size: var(--text-sm);
}

.line-track-label span {
  color: var(--color-muted);
  font-size: var(--text-xs);
}

.line-nodes {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
}

.line-node {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  max-width: 220px;
  min-height: 42px;
  padding: 6px 9px;
  border: 1px solid rgba(255, 255, 255, 0.75);
  border-radius: var(--radius-lg);
  background: rgba(255, 255, 255, 0.82);
}

.line-node.is-highlight {
  border-color: var(--line-color);
  box-shadow: inset 0 0 0 1px var(--line-color);
}

.node-copy {
  display: grid;
  min-width: 0;
}

.node-copy b {
  overflow: hidden;
  color: var(--color-text);
  font-size: var(--text-sm);
  line-height: 1.25;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.node-copy small {
  color: var(--color-muted);
  font-size: var(--text-xs);
}

.line-arrow {
  color: var(--line-color);
  font-weight: 900;
}

.forecast-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.14fr) minmax(280px, 0.86fr);
  gap: var(--space-6);
  padding-top: var(--space-4);
}

.analysis-block {
  min-width: 0;
}

.analysis-block p {
  margin-bottom: var(--space-2);
  color: #31404c;
  line-height: 1.75;
}

.analysis-block {
  padding: var(--space-3);
  border-radius: var(--radius-lg);
}

.analysis-block:first-child {
  background: rgba(255, 255, 255, 0.72);
}

.headline {
  color: var(--color-text);
  font-weight: 800;
}

.risk-text {
  color: #694d17;
}

.line-list,
.signal-list,
.notes {
  margin: 0;
  padding-left: var(--space-5);
  line-height: 1.75;
}

.line-list li,
.signal-list li {
  margin-bottom: var(--space-2);
}

.line-list b {
  color: var(--color-text);
}

.line-list span {
  display: block;
  color: var(--color-muted);
}

.details {
  margin-top: var(--space-4);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-border);
}

.details summary {
  cursor: pointer;
  color: var(--color-accent-dark);
  font-weight: 800;
}

.detail-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr);
  gap: var(--space-5);
  margin-top: var(--space-4);
}

.source-link {
  display: inline-block;
  margin-top: var(--space-3);
  color: var(--color-accent-dark);
  font-weight: 800;
  text-decoration: none;
}

.race-head {
  padding: var(--space-5);
  margin-bottom: var(--space-4);
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-top: var(--space-3);
  color: var(--color-muted);
  font-size: var(--text-sm);
}

.compact-metrics {
  grid-template-columns: repeat(3, minmax(90px, 1fr));
  min-width: 310px;
  margin-bottom: 0;
}

.analysis-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.75fr);
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.surface-panel {
  padding: var(--space-4);
  box-shadow: none;
}

.section-head {
  margin-bottom: var(--space-4);
}

.table-wrap,
.mini-table {
  width: 100%;
  overflow-x: auto;
}

.data-table {
  width: 100%;
  min-width: 760px;
  border-collapse: collapse;
  font-variant-numeric: tabular-nums;
}

.compact-table {
  min-width: 560px;
}

.data-table th,
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--color-border);
  text-align: left;
  vertical-align: top;
  font-size: var(--text-sm);
}

.data-table th {
  position: sticky;
  top: 0;
  background: #f4f7fa;
  color: var(--color-muted);
  font-size: var(--text-xs);
  font-weight: 800;
  white-space: nowrap;
}

.data-table tbody tr:hover td {
  background: #f9fbfc;
}

.data-table tr:last-child td {
  border-bottom: 0;
}

.car {
  display: inline-grid;
  place-items: center;
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  border-radius: 50%;
  background: var(--color-text);
  color: #ffffff;
  font-weight: 800;
  line-height: 1;
}

.car-1 {
  border: 1px solid #cfd6df;
  background: #ffffff;
  color: #111827;
}

.car-2 {
  background: #111827;
  color: #ffffff;
}

.car-3 {
  background: #d71920;
  color: #ffffff;
}

.car-4 {
  background: #1d4ed8;
  color: #ffffff;
}

.car-5 {
  background: #facc15;
  color: #111827;
}

.car-6 {
  background: #16a34a;
  color: #ffffff;
}

.car-7 {
  background: #f97316;
  color: #ffffff;
}

.car-8 {
  background: #ec4899;
  color: #ffffff;
}

.car-9 {
  background: #7c3aed;
  color: #ffffff;
}

.mark {
  color: var(--color-amber);
  font-weight: 800;
  white-space: nowrap;
}

.prob {
  font-variant-numeric: tabular-nums;
  font-weight: 800;
}

.tone {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  margin-bottom: 5px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
  white-space: nowrap;
  font-size: var(--text-xs);
  font-weight: 800;
}

.tone.risk {
  background: var(--color-red-soft);
  color: var(--color-red);
}

.tickets {
  display: grid;
  gap: var(--space-2);
  margin: var(--space-2) 0 var(--space-5);
}

.ticket {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  min-height: 42px;
  border-bottom: 1px solid var(--color-border);
}

.ticket strong {
  font-size: var(--text-lg);
}

.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: var(--space-4);
}

.source-card {
  padding: var(--space-4);
}

.source-card h3 {
  margin-bottom: 6px;
  font-size: var(--text-lg);
}

.source-card p {
  color: var(--color-muted);
  line-height: 1.7;
}

.source-card a {
  display: inline-block;
  margin-top: var(--space-3);
  color: var(--color-accent-dark);
  font-weight: 800;
  text-decoration: none;
}

.empty {
  border: 1px dashed var(--color-border-strong);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  color: var(--color-muted);
  background: var(--color-surface);
}

@media (max-width: 1180px) {
  #todayMetrics {
    grid-template-columns: repeat(3, 1fr);
  }

  .capital-head,
  .plan-card-head {
    align-items: flex-start;
    flex-direction: column;
  }

  .capital-form {
    width: 100%;
    grid-template-columns: repeat(3, minmax(120px, 1fr));
  }

  .plan-leg {
    grid-template-columns: 1fr;
  }

  .plan-money {
    justify-content: flex-start;
  }

  .prediction-summary,
  .forecast-grid,
  .detail-grid,
  .analysis-layout {
    grid-template-columns: 1fr;
  }

  .ticket-row {
    justify-content: flex-start;
  }
}

@media (max-width: 900px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4);
  }

  .tabs {
    grid-template-columns: repeat(3, 1fr);
  }

  .tab {
    text-align: center;
  }

  .page-header,
  .race-head,
  .race-card-head {
    display: grid;
    grid-template-columns: 1fr;
  }

  .venue-section-head {
    align-items: flex-start;
  }

  .venue-section-stats {
    justify-items: start;
  }

  .ribbon-summary {
    grid-template-columns: 70px 44px minmax(150px, 1fr) minmax(116px, 0.7fr) auto 18px;
    gap: var(--space-2);
  }

  .confidence-summary,
  .page-meta {
    justify-items: start;
    text-align: left;
  }

  .compact-metrics {
    min-width: 0;
  }

  .capital-form {
    grid-template-columns: repeat(2, minmax(120px, 1fr));
  }

  .capital-form .button {
    grid-column: 1 / -1;
  }
}

@media (max-width: 560px) {
  .app-shell {
    display: flex;
    flex-direction: column;
  }

  .sidebar {
    display: contents;
  }

  .brand {
    order: 1;
    padding: var(--space-4) var(--space-4) 0;
  }

  .status {
    order: 2;
    margin: 0 var(--space-4);
  }

  .tabs {
    order: 3;
    margin: 0 var(--space-4) var(--space-3);
  }

  .workspace {
    order: 4;
    padding: var(--space-4);
  }

  .sidebar-group {
    order: 5;
    margin: 0 var(--space-4) var(--space-4);
    padding-top: var(--space-4);
  }

  .notice {
    order: 6;
    margin: 0 var(--space-4) var(--space-4);
  }

  h2 {
    font-size: 22px;
  }

  .tabs,
  .button-row {
    grid-template-columns: 1fr 1fr;
  }

  .tabs {
    grid-template-columns: repeat(3, 1fr);
  }

  .venue-board {
    margin-bottom: var(--space-4);
    padding: var(--space-3);
  }

  .capital-planner {
    padding: var(--space-3);
  }

  .capital-form {
    grid-template-columns: 1fr 1fr;
    gap: var(--space-3);
  }

  .capital-form .button {
    grid-column: 1 / -1;
  }

  .venue-section {
    gap: var(--space-2);
  }

  .venue-section-head {
    display: grid;
    grid-template-columns: 1fr;
    padding: var(--space-3);
  }

  .venue-section-stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    white-space: normal;
  }

  .ribbon-summary {
    grid-template-columns: 64px 40px minmax(0, 1fr) 18px;
    gap: var(--space-2);
    min-height: 82px;
    padding: var(--space-2) var(--space-3);
  }

  .ribbon-time {
    grid-column: 1;
    grid-row: 1;
  }

  .ribbon-summary > strong {
    grid-column: 2;
    grid-row: 1;
  }

  .ribbon-main {
    grid-column: 3;
    grid-row: 1;
  }

  .ribbon-summary .confidence-badge {
    grid-column: 1 / 3;
    grid-row: 2;
    justify-self: start;
  }

  .ribbon-tickets {
    grid-column: 3 / 5;
    grid-row: 2;
    max-width: 100%;
  }

  .ribbon-summary::after {
    grid-column: 4;
    grid-row: 1;
  }

  .ribbon-body {
    padding: var(--space-3);
  }

  .line-track {
    grid-template-columns: 1fr;
  }

  .metric-strip {
    grid-template-columns: 1fr 1fr;
    gap: var(--space-2);
  }

  #todayMetrics {
    grid-template-columns: 1fr 1fr;
  }

  .metric {
    min-height: 76px;
    padding: var(--space-3);
  }

  .metric strong {
    font-size: 20px;
  }

  .race-card {
    padding: var(--space-3);
  }

  .race-card-head,
  .prediction-summary,
  .forecast-grid {
    gap: var(--space-3);
  }

  .top3-row,
  .ticket-row {
    display: grid;
    grid-template-columns: 1fr;
  }

  .rank-pill,
  .ticket-chip {
    justify-content: flex-start;
    width: 100%;
  }

  .plan-card,
  .capital-planner,
  .surface-panel,
  .race-head {
    box-shadow: none;
  }

  .plan-leg {
    padding: var(--space-3);
  }

  .plan-ticket,
  .plan-money {
    justify-content: flex-start;
  }

  .data-table th,
  .data-table td {
    padding: 9px 10px;
  }
}

/* Bankroll session */
.bankroll-session .capital-head {
  align-items: flex-start;
}

.bankroll-head-actions {
  display: flex;
  gap: var(--space-2);
}

.bankroll-setup {
  display: grid;
  gap: var(--space-3);
}

.bankroll-form {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  align-items: flex-end;
}

.bankroll-form .field.compact input {
  width: 104px;
}

.check-field.is-disabled {
  opacity: 0.55;
}

.bankroll-rules {
  margin: 0;
  padding: var(--space-3) var(--space-4);
  list-style: none;
  display: grid;
  gap: var(--space-1);
  background: var(--color-surface-muted);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: var(--text-xs);
  color: var(--color-muted);
}

.bankroll-rules li::before {
  content: "・";
  color: var(--color-accent);
}

.bankroll-last {
  margin: 0;
  font-size: var(--text-sm);
  color: var(--color-muted);
}

.bankroll-status {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.bankroll-stop-banner {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2) var(--space-4);
  align-items: center;
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border-strong);
  background: var(--color-surface-muted);
}

.bankroll-stop-banner.is-reached {
  border-color: var(--color-accent);
  background: var(--color-green-soft);
}

.bankroll-stop-banner.is-short {
  border-color: var(--color-red);
  background: var(--color-red-soft);
}

.bankroll-proposal {
  border: 1px solid var(--color-border-strong);
  border-radius: var(--radius-lg);
  background: var(--color-surface-raised);
  padding: var(--space-4);
  margin-bottom: var(--space-4);
  box-shadow: var(--shadow-card);
}

.bankroll-proposal.is-pending {
  border-color: var(--color-amber);
}

.bankroll-tickets {
  display: grid;
  gap: var(--space-2);
  margin: var(--space-3) 0;
}

.bankroll-ticket {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  font-size: var(--text-sm);
}

.bankroll-ticket b {
  font-size: var(--text-lg);
  letter-spacing: 0;
}

.bankroll-ticket .ticket-role {
  min-width: 44px;
  text-align: center;
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: 700;
}

.bankroll-ticket.is-main .ticket-role {
  background: var(--color-green-soft);
  color: var(--color-accent-dark);
}

.bankroll-ticket.is-cover .ticket-role {
  background: var(--color-blue-soft);
  color: var(--color-blue);
}

.bankroll-ticket.is-value .ticket-role {
  background: var(--color-purple-soft);
  color: var(--color-purple);
}

.bankroll-ticket em {
  color: var(--color-muted);
  font-style: normal;
}

.bankroll-ticket strong {
  margin-left: auto;
}

.bankroll-proposal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2) var(--space-4);
  font-size: var(--text-xs);
  color: var(--color-muted);
}

.bankroll-actions {

  align-items: flex-end;
  gap: var(--space-2);
  margin-top: var(--space-3);
}

.bankroll-note {
  margin: var(--space-2) 0 0;
  font-size: var(--text-xs);
  color: var(--color-subtle);
}

.bankroll-judged {
  display: grid;
  gap: var(--space-1);
  margin-bottom: var(--space-4);
}

.judged-title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-muted);
  text-transform: none;
}

.judged-row {

  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2) var(--space-3);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  font-size: var(--text-sm);
}

.judged-row.is-skip {
  color: var(--color-muted);
}

.judged-row.is-next {
  border-color: var(--color-accent);
  background: var(--color-green-soft);
}

.judged-decision {
  font-weight: 700;
}

.judged-row.is-bet .judged-decision {
  color: var(--color-accent-dark);
}

.judged-reason {
  font-size: var(--text-xs);
  color: var(--color-subtle);
}

.bankroll-history {
  margin-bottom: var(--space-3);
}

.bankroll-restart {
  margin-top: var(--space-4);
  padding-top: var(--space-4);

}

@media (max-width: 900px) {

    margin-left: 0;
    width: 100%;
  }
}

/* Results / answer check */
.results-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}

.date-chip {
  min-height: 34px;
  padding: 5px 14px;
  border: 1px solid var(--color-border);
  border-radius: 999px;
  background: var(--color-surface);
  color: var(--color-muted);
  font-weight: 700;
  font-size: var(--text-sm);
  cursor: pointer;
}

.date-chip.active {
  border-color: var(--color-ink-900);
  background: var(--color-ink-900);
  color: #ffffff;
}

.results-metrics {
  grid-template-columns: repeat(4, minmax(120px, 1fr));
}

.results-venue {
  margin-bottom: var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  overflow: hidden;
}

.results-venue-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface-muted);
}

.results-venue-head span {
  color: var(--color-muted);
  font-size: var(--text-xs);
}

.results-rows {
  display: grid;
}

.result-row {
  display: grid;
  grid-template-columns: 56px 40px minmax(150px, 1fr) minmax(180px, 1.2fr) minmax(110px, auto) 92px;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  font-size: var(--text-sm);
}

.result-row:last-child {

}

.result-row.is-hit_trifecta {
  background: #fff9e8;
}

.result-row.is-hit_honmei {
  background: #f2faf7;
}

.result-pick em {
  color: var(--color-muted);
  font-style: normal;
  font-size: var(--text-xs);
}

.result-tickets {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}

.result-ticket {
  padding: 1px 8px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-surface);
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-muted);
}

.result-ticket.is-hit {
  border-color: var(--color-amber);
  background: var(--color-amber-soft);
  color: var(--color-amber);
}

.result-order {
  display: flex;
  align-items: center;
  gap: 3px;
}

.pending-text {
  color: var(--color-subtle);
  font-style: normal;
  font-size: var(--text-xs);
}

.hit-badge {
  justify-self: end;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: var(--text-xs);
  font-weight: 700;
  text-align: center;
  white-space: nowrap;
}

.hit-badge.hit-trifecta {
  background: var(--color-gold);
  color: #4a3200;
}

.hit-badge.hit-honmei {

}

const STATIC_API = {
  "/api/today": "static-api/today.json",

const el = (id) => document.getElementById(id);

function on(id, event, handler) {
  const node = el(id);
  if (node) node.addEventListener(event, handler);
}

async function apiGet(url) {
  try {
    const res = await fetch(url);
    if (res.ok) {
      return res;
    }
    throw new Error(`HTTP ${res.status}`);
  } catch (error) {
    const path = url.split("?")[0];
    const fallback = STATIC_API[path];
    if (!fallback) {
      throw error;
    }
    return fetch(fallback);
  }
}

async function apiPost(url, options) {
  try {
    const res = await fetch(url, options);
    if (res.ok) {
      return res;
    }
    throw new Error(`HTTP ${res.status}`);
  } catch (error) {
    return {
      ok: true,
      json: async () => ({
        ok: false,
        error: "公開版では保存や手動学習は使えません。ローカル版で実行してください。",
      }),
    };
  }
}

async function loadToday() {
  setStatus("今日の予想を読み込み中");
  try {
    const res = await apiGet("/api/today");
    const payload = await res.json();
    if (!payload.ok) {
      setStatus(payload.error || "今日の予想を読み込めませんでした");
      return;
    }
    state.today = payload;
    state.learning = payload.learning_status || state.learning;
    renderToday();
    renderLearn();
    setStatus(`${payload.summary?.count || 0}レースを表示中`);
  } catch (error) {
    setStatus(`今日の予想エラー: ${error.message}`);
  }
}

async function loadLearnStatus() {

    if (payload.ok) {
      state.learning = payload.status;
      renderLearn();
    }
  } catch {

async function loadResults(date) {
  try {
    const url = date ? `/api/results?date=${encodeURIComponent(date)}` : "/api/results";
    const res = await apiGet(url);
    const payload = await res.json();
    if (!payload.ok) {
      el("resultsBody").innerHTML = `<div class="empty">${escapeHtml(payload.error || "結果を読み込めませんでした。")}</div>`;
      return;
    }
    state.results = payload;
    renderResults(payload);
  } catch (error) {
    el("resultsBody").innerHTML = `<div class="empty">結果エラー: ${escapeHtml(error.message)}</div>`;
  }
}

  const summary = payload.summary || {};
  el("resultsDates").innerHTML = (payload.dates || [])

function resultBadge(status) {
  if (status === "hit_trifecta") return `<span class="hit-badge hit-trifecta">3連単的中</span>`;
  if (status === "hit_honmei") return `<span class="hit-badge hit-honmei">本命的中</span>`;

  if (status === "miss") return `<span class="hit-badge hit-miss">ハズレ</span>`;
  return `<span class="hit-badge hit-pending">結果待ち</span>`;
}

  const parts = String(iso || "").split("-");
  if (parts.length !== 3) return iso;
  return `${Number(parts[1])}/${Number(parts[2])}`;
}

/*
 * バンク形状(KEIRIN.JPガイド準拠): 直線+半円の競走路。
 * ゴール=ホームストレッチライン(下側直線)、打鐘=残り1周半のバックストレッチライン通過。
 * センターライン: 直線 y=250/50 (x 170..470)、両端は半径100の半円。
 */
const MOTION = { duration: 10000, laps: 2 };
const BANK = {
  x1: 170,
  x2: 470,
  yBottom: 250,
  yTop: 50,
  cy: 150,
  r: 100,
  goalX: 430,
};
BANK.arcLen = Math.PI * BANK.r;
BANK.straight = BANK.x2 - BANK.x1;
BANK.segA = BANK.x2 - BANK.goalX; // ゴール→1コーナー
BANK.perimeter = 2 * BANK.straight + 2 * BANK.arcLen;

function bankPointAt(fraction) {
  let s = ((fraction % 1) + 1) % 1 * BANK.perimeter;
  const { x1, x2, yBottom, yTop, cy, r, goalX, segA, arcLen, straight } = BANK;
  if (s < segA) {
    return { x: goalX + s, y: yBottom, nx: 0, ny: 1 };
  }
  s -= segA;
  if (s < arcLen) {
    const theta = Math.PI / 2 - s / r;
    return { x: x2 + r * Math.cos(theta), y: cy + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  s -= arcLen;
  if (s < straight) {
    return { x: x2 - s, y: yTop, nx: 0, ny: -1 };
  }
  s -= straight;
  if (s < arcLen) {
    const theta = -Math.PI / 2 - s / r;
    return { x: x1 + r * Math.cos(theta), y: cy + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  s -= arcLen;
  return { x: x1 + s, y: yBottom, nx: 0, ny: 1 };
}

function toggleRaceMotion(raceKey) {
  const race = (state.today?.forecasts || []).find((item) => item.race_key === raceKey);
  const container = document.querySelector(`[data-motion-race="${CSS.escape(raceKey)}"]`);
  if (!race || !container) return;
  const stage = container.querySelector(".motion-stage");
  const btn = container.querySelector(".motion-btn");
  if (state.motionTimers[raceKey]) {
    clearInterval(state.motionTimers[raceKey]);
    delete state.motionTimers[raceKey];
  }
  stage.hidden = false;
  btn.textContent = "↺ もう一度再生";
  startRaceMotion(raceKey, race, stage);
}

function buildMotionPlan(race) {
  const entries = race.entries || [];
  const lineup = (race.lineup || []).map((line) => line.map(Number));
  const probs = new Map(entries.map((entry) => [Number(entry.car_no), Number(entry.win_probability || 0)]));
  const styles = new Map(entries.map((entry) => [Number(entry.car_no), entry.style || ""]));
  let cars = entries.map((entry) => Number(entry.car_no)).filter(Boolean);
  if (!cars.length) cars = lineup.flat();
  cars = [...new Set(cars)];

  const initial = [...lineup.flat().filter((car) => cars.includes(car)), ...cars.filter((car) => !lineup.flat().includes(car))];

  const top3 = (race.top3 || []).map((row) => Number(row.car_no)).filter(Boolean);
  const rest = cars.filter((car) => !top3.includes(car)).sort((a, b) => (probs.get(b) || 0) - (probs.get(a) || 0));
  const final = [...top3, ...rest];

  const escapeLine =
    lineup.find((line) => styles.get(line[0]) === "逃") ||
    lineup.find((line) => line.length >= 2) ||
    (lineup.length ? [lineup[0]].flat() : [initial[0]].filter(Boolean));
  const afterBell = [...escapeLine.filter((car) => initial.includes(car)), ...initial.filter((car) => !escapeLine.includes(car))];

  const topCar = final[0];
  const attackLine = lineup.find((line) => line.includes(topCar) && line !== escapeLine);
  let backStretch;
  if (attackLine) {
    const others = afterBell.filter((car) => !attackLine.includes(car));
    backStretch = [...others.slice(0, 1), ...attackLine, ...others.slice(1)];
  } else {
    backStretch = afterBell;
  }

  // キーフレームとキャプションは「先頭の走破周回数」基準。
  // 打鐘=残り1周半(2周走のうち0.5周消化)、最終バック=残り半周(1.5周消化)。
  return {
    cars,
    keyframes: [
      { lap: 0.0, order: initial },
      { lap: 0.5, order: afterBell },
      { lap: 1.5, order: backStretch },
      { lap: 1.9, order: final },
      { lap: 2.0, order: final },
    ],
    captions: [
      { lap: 0.0, text: "青板、先頭員の後ろで隊列を組んで周回" },
      { lap: 0.5, text: "🔔 打鐘!残り1周半、先行ラインが踏み込む" },
      { lap: 1.0, text: "残り1周、ホームストレッチライン通過" },
      { lap: 1.5, text: "最終バック、まくり勢が外から仕掛ける" },
      { lap: 1.87, text: "直線勝負!内圏線と外帯線の間で追い比べ" },
      { lap: 1.99, text: `ゴール!1着予想 ${topCar || "-"} ${escapeHtml((race.top3?.[0]?.name) || "")}` },
    ],
  };
}

function startRaceMotion(raceKey, race, stage) {
  const svg = stage.querySelector(".motion-svg");
  const caption = stage.querySelector(".motion-caption");
  const plan = buildMotionPlan(race);
  if (!plan.cars.length) {
    caption.textContent = "出走データが足りないため再生できません";
    return;
  }
  svg.innerHTML = motionTrackSvg() + plan.cars.map((car) => motionRiderSvg(car)).join("");
  const riders = new Map(plan.cars.map((car) => [car, svg.querySelector(`[data-rider="${car}"]`)]));

  const started = performance.now();
  const gapStep = 0.014; // 車間(周回の割合)

  const positionAt = (car, coveredLaps) => {
    const frames = plan.keyframes;
    let a = frames[0];
    let b = frames[frames.length - 1];
    for (let i = 0; i < frames.length - 1; i += 1) {
      if (coveredLaps >= frames[i].lap && coveredLaps <= frames[i + 1].lap) {
        a = frames[i];
        b = frames[i + 1];
        break;
      }
    }
    const span = Math.max(0.0001, b.lap - a.lap);
    const local = Math.min(1, Math.max(0, (coveredLaps - a.lap) / span));
    const eased = local * local * (3 - 2 * local);
    const posA = Math.max(0, a.order.indexOf(car));
    const posB = Math.max(0, b.order.indexOf(car));
    const gap = (posA + (posB - posA) * eased) * gapStep;
    const overtaking = posB < posA ? Math.sin(local * Math.PI) : 0;
    return { gap, outside: overtaking * 12 };
  };

  const tick = () => {
    const progress = Math.min(1, (performance.now() - started) / MOTION.duration);
    // 打鐘後にピッチが上がる: 序盤ゆっくり→終盤加速(eased は 0..1)
    const eased = progress < 0.4 ? progress * 0.7 : 0.28 + (progress - 0.4) * 1.2;
    const covered = Math.min(MOTION.laps, eased * MOTION.laps);
    plan.cars.forEach((car) => {
      const node = riders.get(car);
      if (!node) return;
      const { gap, outside } = positionAt(car, covered);
      const point = bankPointAt(covered - gap);
      const x = point.x + point.nx * outside;
      const y = point.y + point.ny * outside;
      node.setAttribute("transform", `translate(${x.toFixed(1)}, ${y.toFixed(1)})`);
    });
    const active = plan.captions.filter((item) => covered >= item.lap).pop();
    if (active) caption.innerHTML = active.text;
    if (progress >= 1 && state.motionTimers[raceKey]) {
      clearInterval(state.motionTimers[raceKey]);
      delete state.motionTimers[raceKey];
    }
  };
  tick();
  state.motionTimers[raceKey] = setInterval(tick, 33);
}

function motionTrackSvg() {
  const { x1, x2, cy, r, goalX, perimeter, segA, arcLen, straight } = BANK;
  // センターライン半径rに対するオフセットで各ラインを描く(rect rx=半径でスタジアム形状)
  const ring = (offset, cls, extra = "") => {
    const radius = r + offset;
    return `<rect x="${x1 - radius}" y="${cy - radius}" width="${x2 - x1 + radius * 2}" height="${radius * 2}" rx="${radius}" class="${cls}" ${extra}/>`;
  };
  // バックストレッチライン: ゴールからちょうど半周の地点(上側直線)
  const backX = x2 - (perimeter / 2 - segA - arcLen);
  return `
    ${ring(26, "bank-track")}
    ${ring(-22, "bank-refuge")}
    ${ring(-34, "bank-infield")}
    ${ring(-8, "bank-yellow-line")}
    ${ring(-16, "bank-outer-line")}
    ${ring(-22, "bank-inner-line")}
    <line x1="${goalX}" y1="${cy + r - 24}" x2="${goalX}" y2="${cy + r + 26}" class="goal-line" />
    <text x="${goalX + 6}" y="${cy + r + 22}" class="goal-text">GOAL</text>
    <line x1="${backX}" y1="${cy - r - 26}" x2="${backX}" y2="${cy - r + 24}" class="back-line" />
    <text x="${backX + 8}" y="${cy - r - 14}" class="back-text">バック線(打鐘)</text>
  `;
}

function motionRiderSvg(car) {
  const [fill, text] = CAR_COLORS[car] || ["#8d8f97", "#ffffff"];
  return `<g data-rider="${car}" class="motion-rider">
    <circle r="13" fill="${fill}" stroke="#2b2b2e" stroke-width="1.4" />
    <text y="4.5" text-anchor="middle" fill="${text}" font-size="12" font-weight="700">${car}</text>
  </g>`;
}

async function loadBankroll() {
  try {
    const res = await apiGet("/api/bankroll");
    const payload = await res.json();
    state.bankroll = payload;
    renderBankroll(payload);
  } catch (error) {
    el("bankrollBody").innerHTML = `<div class="empty">運用状態を読み込めません: ${escapeHtml(error.message)}</div>`;
  }
}

async function bankrollPost(path, body) {
  try {
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    });
    const payload = await res.json();
    if (payload.ok === false) {
      setStatus(payload.error || "運用操作に失敗しました");
      return null;
    }
    state.bankroll = payload;
    renderBankroll(payload);
    return payload;
  } catch {
    setStatus("運用セッションはローカル版でのみ操作できます");
    return null;
  }
}

function startBankroll() {
  bankrollPost("/api/bankroll/start", {
    start_amount: Number(el("brStart").value || 0),
    target_amount: Number(el("brTarget").value || 0),
    style: state.bankrollStyle || "balance",
  }).then((payload) => {
    if (payload) setStatus("運用セッションを開始しました");
  });
}

function styleEstimate(style, start, target) {
  const races = (growth) => {
    if (!growth || growth <= 0 || !start || target <= start) return null;
    return Math.min(99, Math.ceil(Math.log(target / start) / Math.log(1 + growth)));
  };
  const cap = style.per_race_cap_pct / 100;
  const mainWeight = style.weights?.[0]?.[1] ?? 0.5;
  return {
    expected: races(cap * (style.min_ev - 1)),
    fast: races(cap * (mainWeight * style.assumed_main_odds - 1)),
  };
}

function updateStyleEstimates() {
  const start = Number(el("brStart")?.value || 0);
  const target = Number(el("brTarget")?.value || 0);
  (state.bankroll?.styles || []).forEach((style) => {
    const node = document.getElementById(`styleEst-${style.key}`);
    if (!node) return;
    const est = styleEstimate(style, start, target);
    node.textContent = est.fast
      ? `目安 ${est.fast}〜${est.expected ?? "-"}レースで達成`
      : "目標額を元手より大きくしてください";
  });
}

function selectBankrollStyle(key) {
  state.bankrollStyle = key;
  document.querySelectorAll(".style-card").forEach((node) => {
    node.classList.toggle("active", node.dataset.style === key);
  });
}

function commitBankroll() {
  const proposal = state.bankroll?.proposal;
  if (!proposal) return;
  if (!window.confirm(`${proposal.venue}${proposal.race_no}Rに合計${proposal.total_stake}円を購入した記録を付けます。実際の購入はWINTICKET等でご自身の確認のうえ行ってください。`)) {
    return;
  }
  bankrollPost("/api/bankroll/commit", { proposal }).then((payload) => {
    if (payload) setStatus("購入を記録しました。結果確定後に入力してください");
  });
}

function skipBankroll() {
  const proposal = state.bankroll?.proposal;
  if (!proposal) return;
  bankrollPost("/api/bankroll/skip", {
    race: proposal,
    reason: "手動見送り",
  }).then((payload) => {
    if (payload) setStatus("このレースを見送りました");
  });
}

function recordBankrollResult(outcome) {
  const pending = state.bankroll?.state?.pending_bet;
  if (!pending) return;
  let payout = 0;
  if (outcome === "won") {
    payout = Number(el("brPayout")?.value || 0);
    if (!payout) {
      setStatus("的中時は払戻額を入力してください");
      return;
    }
  }
  bankrollPost("/api/bankroll/result", { bet_id: pending.id, outcome, payout }).then((payload) => {
    if (payload) setStatus(outcome === "won" ? "的中を記録しました" : "不的中を記録しました");
  });
}

function stopBankroll() {
  if (!window.confirm("運用セッションを停止しますか？")) return;
  bankrollPost("/api/bankroll/stop", { reason: "手動停止" }).then((payload) => {
    if (payload) setStatus("運用セッションを停止しました");
  });
}

async function copyProposalTickets() {
  const text = state.bankroll?.proposal?.copy_text || "";
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    setStatus("買い目をコピーしました");
  } catch {
    setStatus("コピーできませんでした。手動で選択してください");
  }
}

function renderBankroll(payload) {
  const head = el("bankrollHeadActions");
  const body = el("bankrollBody");
  const session = payload.session;
  const brState = payload.state;

  if (!session) {
    head.innerHTML = "";
    body.innerHTML = renderBankrollSetup(payload);
    bindBankrollSetup();
    return;
  }

  if (session.status !== "active") {
    head.innerHTML = "";
    body.innerHTML = `${renderBankrollStopBanner(session, brState)}
      ${renderBankrollStatus(session, brState)}
      ${renderBankrollHistory(brState)}
      <div class="bankroll-restart">${renderBankrollSetup(payload)}</div>`;
    bindBankrollSetup();
    return;
  }

  head.innerHTML = `<button id="brStopBtn" class="button">停止</button>`;
  on("brStopBtn", "click", stopBankroll);

  const parts = [renderBankrollStatus(session, brState)];
  if (brState.pending_bet) {
    parts.push(renderBankrollPending(brState.pending_bet));
  } else if (payload.proposal) {
    parts.push(renderBankrollProposal(payload.proposal));
  } else {
    parts.push(`<div class="empty">${escapeHtml(payload.message || "提案できるレースがありません。しばらくして更新してください。")}</div>`);
  }
  if ((payload.judged_races || []).length) {
    parts.push(renderBankrollJudged(payload.judged_races));
  }
  parts.push(renderBankrollHistory(brState));
  body.innerHTML = parts.join("");

  on("brCommitBtn", "click", commitBankroll);
  on("brSkipBtn", "click", skipBankroll);
  on("brCopyBtn", "click", copyProposalTickets);
  on("brWonBtn", "click", () => recordBankrollResult("won"));
  on("brLostBtn", "click", () => recordBankrollResult("lost"));
  on("brRefreshBtn", "click", loadBankroll);
}

  const config = payload.last_session?.config || payload.session?.config || {};
  const selected = state.bankrollStyle || config.style || "balance";
  state.bankrollStyle = selected;
  const lastNote = payload.last_session
    ? `<p class="bankroll-last">前回: ${escapeHtml(payload.last_session.stop_reason || "停止")} / 最終残高 ${yen(payload.last_session.state?.balance ?? 0)}</p>`

  const styleCards = (payload.styles || [])

      (style) => `<button type="button" class="style-card${style.key === selected ? " active" : ""}" data-style="${escapeAttr(style.key)}">
        <strong>${escapeHtml(style.label)}</strong>
        <span>${escapeHtml(style.description)}</span>
        <small>1R上限${style.per_race_cap_pct}% / 損失上限${style.daily_loss_limit_pct}% / ${style.max_consecutive_losses}連敗停止 / EV${style.min_ev}</small>

      <label class="check-field is-disabled"><input type="checkbox" disabled /><span>自動購入(未対応・常時OFF)</span></label>
      <button id="brStartBtn" class="button primary">運用を開始</button>
    </div>
    <ul class="bankroll-rules">
      ${(state.bankroll?.rules || []).map((rule) => `<li>${escapeHtml(rule)}</li>`).join("")}

}

function bindBankrollSetup() {
  on("brStartBtn", "click", startBankroll);
  on("brStart", "input", updateStyleEstimates);
  on("brTarget", "input", updateStyleEstimates);
  document.querySelectorAll(".style-card").forEach((node) => {
    node.addEventListener("click", () => selectBankrollStyle(node.dataset.style));
  });
  updateStyleEstimates();
}

function renderVenueForecastSections(rows) {
  return groupForecastsByVenue(rows)
    .map((group) => {
      const strong = group.races.filter((race) => race.confidence?.label === "強").length;
      const first = group.races[0];
      const last = group.races[group.races.length - 1];
      return `<section class="venue-section">
        <header class="venue-section-head">
          <div>
            <span class="status-dot">受付中</span>
            <h3>${escapeHtml(group.venue)}</h3>
            <p>${group.races.length}レース / ${escapeHtml(first.start_time || "--:--")} - ${escapeHtml(last.start_time || "--:--")}</p>
          </div>
          <div class="venue-section-stats">
            ${badge(`強 ${strong}`, "confidence-badge")}
            <span>${escapeHtml(first.race_date || "")}</span>
          </div>
        </header>
        <div class="venue-ribbon-list">
          ${group.races.map(renderForecastCard).join("")}
        </div>
      </section>`;
    })
    .join("");
}

function groupForecastsByVenue(rows) {
  const groups = new Map();
  for (const race of rows) {
    const venue = race.venue || "未設定";
    if (!groups.has(venue)) groups.set(venue, []);
    groups.get(venue).push(race);
  }
  return [...groups.entries()]
    .map(([venue, races]) => ({
      venue,
      races: races.sort((a, b) => String(a.start_time || "99:99").localeCompare(String(b.start_time || "99:99"))),
    }))
    .sort((a, b) => String(a.races[0]?.start_time || "99:99").localeCompare(String(b.races[0]?.start_time || "99:99")));
}


function renderVenueBoard(forecasts) {
  const venues = new Map();
  for (const race of forecasts) {
    const venue = race.venue || "未設定";
    const current = venues.get(venue) || {
      venue,
      count: 0,
      firstTime: race.start_time || "--:--",
      raceNo: race.race_no || "-",
      strong: 0,
    };
    current.count += 1;
    if ((race.start_time || "99:99") < (current.firstTime || "99:99")) {
      current.firstTime = race.start_time || "--:--";
      current.raceNo = race.race_no || "-";
    }
    if (race.confidence?.label === "強" || race.confidence?.label === "強") current.strong += 1;
    venues.set(venue, current);
  }
  el("venueBoard").innerHTML = [...venues.values()]
    .sort((a, b) => String(a.firstTime).localeCompare(String(b.firstTime)))
    .map(
      (item) => `<article class="venue-chip">
        <span class="status-dot">受付中</span>
        <strong>${escapeHtml(item.venue)}</strong>
        <small>${escapeHtml(item.raceNo)}R 発走 ${escapeHtml(item.firstTime)} / ${item.count}レース</small>
        <em>強 ${item.strong}</em>
      </article>`
    )
    .join("");
}

function filterForecasts(rows) {
  const confidenceFilter = el("confidenceFilter");
  const confidence = confidenceFilter ? confidenceFilter.value : "all";
  return rows.filter((race) => {
    if (confidence !== "all" && race.confidence?.label !== confidence) return false;
    return true;
  });
}

function renderForecastCard(race) {
  const top = race.top3?.[0] || {};
  const second = race.top3?.[1] || {};
  const third = race.top3?.[2] || {};
  const confidence = race.confidence || {};
  const tickets = (race.tickets || []).map(ticketChip).join("");
  const primaryTickets = (race.tickets || [])
    .slice(0, 3)
    .map((ticket) => ticket.label)
    .join(" / ");
  const lines = (race.lines || []).map(lineItem).join("");
  const signals = (race.comment_signals || []).map((signal) => `<li>${escapeHtml(signal)}</li>`).join("");

  return `<details class="race-ribbon ${confidenceClass(confidence.label)}">
    <summary class="ribbon-summary">
      <span class="ribbon-time">${escapeHtml(race.start_time || "--:--")}</span>
      <strong>${escapeHtml(race.race_no || "")}R</strong>
      <span class="ribbon-main">${car(top.car_no)} ${escapeHtml(top.name || "-")} <em>${percent(top.probability)}</em></span>
      <span class="ribbon-tickets">${escapeHtml(primaryTickets || "-")}</span>
      ${badge(confidence.label || "混戦", "confidence-badge")}
    </summary>
    <div class="ribbon-body">
      <article class="race-card ribbon-card ${confidenceClass(confidence.label)}">
        <header class="race-card-head">
          <div class="race-title-block">
            <span class="time-chip">${escapeHtml(race.start_time || "--:--")}</span>
            <h3>${escapeHtml(race.venue || "")} ${escapeHtml(race.race_no || "")}R</h3>
            <p>${escapeHtml(race.event || race.race_class || "")}</p>
          </div>
          <div class="confidence-summary">
            ${badge(confidence.label || "混戦", "confidence-badge")}
            ${race.scenario?.pattern ? badge(race.scenario.pattern, "pattern-badge") : ""}
            <span>${escapeHtml(confidence.reason || "")}</span>
          </div>
        </header>

        <div class="prediction-summary">
          <div class="main-pick">
            <span>本命</span>
            <strong>${car(top.car_no)} ${escapeHtml(top.name || "-")}</strong>
            <em>${percent(top.probability)}</em>
          </div>
          <div class="top3-row">
            ${rankPill(1, top)}
            ${rankPill(2, second)}
            ${rankPill(3, third)}
          </div>
          <div class="ticket-row">${tickets}</div>
        </div>

        ${renderLineDiagram(race.lines || [], race.top3 || [])}

        <div class="race-motion" data-motion-race="${escapeAttr(race.race_key || "")}">
          <button type="button" class="button motion-btn" data-race="${escapeAttr(race.race_key || "")}">▶ 展開を再生</button>
          <div class="motion-stage" hidden>
            <div class="motion-caption">周回中</div>
            <svg class="motion-svg" viewBox="0 0 640 300" role="img" aria-label="展開予想アニメーション"></svg>
          </div>
        </div>

        <div class="forecast-grid">
          <section class="analysis-block">
            <h4>展開</h4>
            <p class="headline">${escapeHtml(race.scenario?.headline || "")}</p>
            <p>${escapeHtml(race.scenario?.flow || "")}</p>
            <p>${escapeHtml(race.scenario?.watch || "")}</p>
            <p class="risk-text">${escapeHtml(race.scenario?.upset || "")}</p>
          </section>
          <section class="analysis-block">
            <h4>ライン/関係性</h4>
            <ul class="line-list">${lines}</ul>
          </section>
        </div>

        <details class="details">
          <summary>コメント根拠と全選手</summary>
          <div class="detail-grid">
            <section>
              <h4>コメントの心理シグナル</h4>
              <ul class="signal-list">${signals}</ul>
            </section>
            <section>
              <h4>出走表</h4>
              <div class="mini-table">${renderMiniEntries(race.entries || [])}</div>
            </section>
          </div>
          <a class="source-link" href="${escapeAttr(race.url || "#")}" target="_blank" rel="noreferrer">WINTICKETで開く</a>
        </details>
      </article>
    </div>
  </details>`;
}

function renderMiniEntries(entries) {
  return `<table class="data-table compact-table">
    <thead>
      <tr>
        <th>車</th>
        <th>選手</th>
        <th>脚質</th>
        <th>得点</th>
        <th>コメント</th>
      </tr>
    </thead>
    <tbody>
      ${entries
        .map(
          (row) => `<tr>
            <td>${car(row.car_no)}</td>
            <td><strong>${escapeHtml(row.name)}</strong><br><span class="muted">${escapeHtml(row.prefecture || "")} ${escapeHtml(row.class || "")}</span></td>
            <td>${escapeHtml(row.style || "")}</td>
            <td>${num(row.racing_score)}</td>
            <td>${escapeHtml(row.comment || "")}</td>
          </tr>`
        )
        .join("")}
    </tbody>
  </table>`;
}

function renderLearn() {
  const status = state.learning || {};
  const model = state.learnedModel || {};
  const training = model.training || {};
  const metrics = model.metrics || {};
  const schedule = state.today?.schedule_summary || {};
  const items = [
    ["保存レース", status.races ?? 0],
    ["保存選手", status.entries ?? 0],
    ["結果付きレース", status.result_races ?? 0],
    ["教師行", status.result_entries ?? training.rows ?? 0],
    ["予想保存", status.predictions ?? 0],
    ["3年開催索引", schedule.total_events ?? "-"],
    ["Top1精度", metrics.top1_accuracy != null ? percent(metrics.top1_accuracy) : "-"],
    ["LogLoss", metrics.log_loss ?? "-"],
    ["DB", status.db_path || "-"],
  ];
  el("learnModelLabel").textContent = model.name || "transparent-baseline + online-logistic-win";
  el("learnGrid").innerHTML = [
    ["レース", status.races ?? 0, "保存", "teal"],
    ["教師", status.result_entries ?? training.rows ?? 0, "行", "purple"],
    ["結果付き", status.result_races ?? 0, "レース", "green"],
    ["3年索引", schedule.total_events ?? "-", "開催", "slate"],
  ]
    .map(metric)
    .join("");
  el("learnBody").innerHTML = items
    .map(([key, value]) => `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`)
    .join("");
}

function metric([label, value, caption, tone = "slate"]) {
  return `<div class="metric metric-${tone}">
    <span>${escapeHtml(label)}</span>
    <strong>${escapeHtml(value)}</strong>
    ${caption ? `<em>${escapeHtml(caption)}</em>` : ""}
  </div>`;
}

function badge(text, className = "") {
  return `<span class="badge ${className}">${escapeHtml(text)}</span>`;
}

function rankPill(rank, row) {
  if (!row || row.car_no == null) return "";
  return `<span class="rank-pill"><b>${rank}</b>${car(row.car_no)}<span>${escapeHtml(row.name)}</span><em>${percent(row.probability)}</em></span>`;
}

function ticketChip(ticket) {
  return `<span class="ticket-chip">${escapeHtml(ticket.label)}${ticket.score != null ? `<em>${score(ticket.score)}</em>` : ""}</span>`;
}

function renderLineDiagram(lines, top3) {
  if (!lines.length) return "";
  const topCars = new Set(top3.map((row) => Number(row.car_no)));
  return `<div class="line-diagram" aria-label="ライン図">
    <div class="diagram-title">
      <span>ライン図</span>
      <strong>隊列と仕掛けどころ</strong>
    </div>
    <div class="line-tracks">
      ${lines.map((line, index) => renderLineTrack(line, index, topCars)).join("")}
    </div>
  </div>`;
}

function renderLineTrack(line, index, topCars) {
  const members = line.members || [];
  const color = (index % 5) + 1;
  const memberNodes = members
    .map((member, memberIndex) => {
      const highlight = topCars.has(Number(member.car_no)) ? " is-highlight" : "";
      const arrow = memberIndex < members.length - 1 ? `<span class="line-arrow">→</span>` : "";
      return `<span class="line-node${highlight}">
        ${car(member.car_no)}
        <span class="node-copy">
          <b>${escapeHtml(member.name || "")}</b>
          <small>${escapeHtml(member.style || "")}</small>
        </span>
      </span>${arrow}`;
    })
    .join("");
  const role = members.length <= 1 ? "単騎" : `${members.length}車ライン`;
  return `<div class="line-track line-color-${color}">
    <div class="line-track-label">
      <b>${escapeHtml(line.label)}</b>
      <span>${role}</span>
    </div>
    <div class="line-nodes">${memberNodes}</div>
  </div>`;
}

function lineItem(line) {
  return `<li><b>${escapeHtml(line.label)}</b><span>${escapeHtml(line.relation)}</span></li>`;
}

function car(value) {
  const carNo = Number(value);
  const className = Number.isFinite(carNo) ? ` car-${carNo}` : "";
  return `<span class="car${className}">${escapeHtml(value ?? "-")}</span>`;
}

function confidenceClass(label) {
  if (label === "強" || label === "強") return "is-strong";
  if (label === "中" || label === "中") return "is-medium";
  return "is-mixed";
}

function formatLineup(lineup) {
  if (!lineup.length) return "並び未取得";
  return lineup.map((line) => line.join("-")).join(" / ");
}

function percent(value) {
  const n = Number(value || 0);
  return `${Math.round(n * 1000) / 10}%`;
}

function score(value) {
  return `${Math.round(Number(value || 0) * 1000) / 10}`;
}

function num(value) {
  if (value === null || value === undefined || value === "") return "-";
  const n = Number(value);
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

function yen(value) {
  return `${Math.round(Number(value || 0)).toLocaleString("ja-JP")}円`;
}

function isRiskTone(tone) {
  return tone === "不安大" || tone === "不安含み";
}

function escapeAttr(value) {
  return escapeHtml(value).replaceAll("`", "&#096;");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>

  </body>
