<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keirin AI Lab</title>
    <link rel="stylesheet" href="styles.css?v=f32d7424" />
  </head>
  <body data-page="home">
    <div class="app-shell">
      <aside class="sidebar" aria-label="メインナビゲーション">
        <div class="brand">
          <span class="brand-mark">K</span>
          <div class="brand-copy">
            <span class="brand-kicker">競輪予想ラボ</span>
            <h1>KEIRIN LAB</h1>
          </div>
        </div>

        <div class="status" id="status" role="status">起動中</div>

        <nav class="side-nav" aria-label="ページ切替">
          <a href="index.html" class="active">本日の予想</a>
          <a href="results.html">結果と収支</a>
          <a href="motion.html">モーションメーカー</a>
        </nav>

        <section class="sidebar-group" aria-labelledby="today-filter-title">
          <div class="sidebar-title" id="today-filter-title">信頼度フィルター</div>
          <label class="field">
            <span>信頼度</span>
            <select id="confidenceFilter">
              <option value="all">すべて</option>
              <option value="強">強</option>
              <option value="中">中</option>
              <option value="混戦">混戦</option>
            </select>
          </label>
          <button id="refreshTodayBtn" class="button primary">最新表示</button>
        </section>


        <p class="notice">予想は研究用です。車券購入や利益を保証するものではありません。</p>
      </aside>

      <main class="workspace">
        <section class="panel active" id="panel-today">
          <header class="page-header">
            <div>
              <p class="greeting" id="greeting"></p>
              <h2>本日の予想</h2>
            </div>
            <span class="page-meta" id="todayMeta">読み込み中</span>
          </header>

          <div class="ai-record" id="aiRecordBar" aria-label="AI予想成績"></div>


          <div class="metric-strip" id="todayMetrics"></div>

          <section class="bankroll-session surface-panel" aria-labelledby="bankrollTitle">
            <div class="capital-head">
              <div>
                <h3 id="bankrollTitle">バンクロール運用</h3>
              </div>
              <div class="bankroll-head-actions" id="bankrollHeadActions"></div>
            </div>
            <div id="bankrollBody">
              <div class="empty">運用状態を読み込み中です。</div>
            </div>
          </section>

          <section class="venue-board" aria-label="本日開催中の競輪場">
            <div class="venue-board-head">
              <span>本日開催中</span>
              <strong>競輪場</strong>
            </div>
            <div class="venue-strip" id="venueBoard"></div>
          </section>

          <section class="recommended-races" id="recommendedSection" hidden></section>

          <div class="race-list" id="forecastList"></div>
        </section>

        <section class="panel" id="panel-learn">
          <header class="page-header">
            <div>
              <h2>学習状態</h2>
            </div>
            <span class="page-meta" id="learnModelLabel">確認中</span>
          </header>
          <div class="metric-strip" id="learnGrid"></div>
          <div class="table-wrap surface-panel">
            <table class="data-table">
              <thead>
                <tr>
                  <th>項目</th>
                  <th>値</th>
                </tr>
              </thead>
              <tbody id="learnBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js?v=f32d7424"></script>
  </body>
</html>
