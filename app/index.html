<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keirin AI Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="繝｡繧､繝ｳ繝翫ン繧ｲ繝ｼ繧ｷ繝ｧ繝ｳ">
        <div class="brand">
          <span class="brand-mark">K</span>
          <div class="brand-copy">
            <span class="brand-kicker">Race Intelligence</span>
            <h1>Keirin AI Lab</h1>
          </div>
        </div>

        <div class="status" id="status" role="status">起動中</div>

        <section class="sidebar-group" aria-labelledby="today-filter-title">
          <div class="sidebar-title" id="today-filter-title">信頼度フィルター</div>
          <label class="field">
            <span>信頼度</span>
            <select id="confidenceFilter">
              <option value="all">すべて</option>
              <option value="強">強</option>
              <option value="中">中</option>
              <option value="混戦">混戦</option>
            </select>
          </label>
          <button id="refreshTodayBtn" class="button primary">最新表示</button>
        </section>


        <p class="notice">予想は研究用です。車券購入や利益を保証するものではありません。</p>
      </aside>

      <main class="workspace">
        <section class="panel active" id="panel-today">
          <header class="page-header">
            <div>
              <p class="eyebrow">Bankroll Operation</p>
              <h2>バンクロール運用モード</h2>
            </div>
            <span class="page-meta" id="todayMeta">読み込み中</span>
          </header>


          <div class="metric-strip" id="todayMetrics"></div>

          <section class="capital-planner surface-panel" aria-labelledby="capitalPlannerTitle">
            <div class="capital-head">
              <div>
                <p class="eyebrow">Bankroll Plan</p>
                <h3 id="capitalPlannerTitle">資金目標と買い目配分</h3>
              </div>
              <div class="capital-form">
                <label class="field compact">
                  <span>元手</span>
                  <input id="startAmount" type="number" min="100" step="100" value="1000" />
                </label>
                <label class="field compact">
                  <span>目標額</span>
                  <input id="targetAmount" type="number" min="100" step="100" value="3000" />
                </label>
                <label class="field compact">
                  <span>最大レース</span>
                  <select id="maxPlanRaces">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                  </select>
                </label>
                <label class="check-field">
                  <input id="liveOddsToggle" type="checkbox" checked />
                  <span>ライブオッズ</span>
                </label>
                <label class="check-field">
                  <input id="autoRollToggle" type="checkbox" />
                  <span>運用モード</span>
                </label>
                <button id="planBtn" class="button primary">候補を出す</button>
              </div>
            </div>
            <div class="plan-result" id="planResult">
              <div class="empty">元手と目標額を入れて、候補レースと買い目配分を出してください。</div>
            </div>
          </section>

          <section class="venue-board" aria-label="本日開催中の競輪場">
            <div class="venue-board-head">
              <span>本日開催中</span>
              <strong>競輪場</strong>
            </div>
            <div class="venue-strip" id="venueBoard"></div>
          </section>

          <div class="race-list" id="forecastList"></div>
        </section>

        <section class="panel" id="panel-learn">
          <header class="page-header">
            <div>
              <p class="eyebrow">Learning</p>
              <h2>蟄ｦ鄙偵・蜿取髪</h2>
            </div>
            <span class="page-meta" id="learnModelLabel">遒ｺ隱堺ｸｭ</span>
          </header>
          <div class="metric-strip" id="learnGrid"></div>
          <div class="table-wrap surface-panel">
            <table class="data-table">
              <thead>
                <tr>
                  <th>鬆・岼</th>
                  <th>蛟､</th>
                </tr>
              </thead>
              <tbody id="learnBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
